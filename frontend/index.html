
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="referrer" content="no-referrer"/>
<title>PawSwipe — Adopt a Pet</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,700;0,900;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #FDF6EE;
    --surface: #FFFAF5;
    --yes: #38C172;
    --no: #E3342F;
    --yes-light: #D4F5E2;
    --no-light: #FDDEDE;
    --ink: #1A120A;
    --ink-2: #6B5A4E;
    --accent: #FF6B35;
    --accent-2: #FFB347;
    --radius: 24px;
    --shadow: 0 12px 48px rgba(0,0,0,0.12), 0 4px 16px rgba(0,0,0,0.08);
    --shadow-sm: 0 4px 12px rgba(0,0,0,0.08);
  }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--ink);
    display: flex;
    flex-direction: column;
    height: 100dvh;
    max-width: 430px;
    margin: 0 auto;
    position: relative;
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px 10px;
    flex-shrink: 0;
  }
  .logo {
    font-family: 'Fraunces', serif;
    font-size: 26px;
    font-weight: 900;
    color: var(--ink);
    letter-spacing: -0.5px;
  }
  .logo span { color: var(--accent); }
  .results-btn {
    background: var(--ink);
    color: #FFF;
    border: none;
    border-radius: 100px;
    padding: 8px 18px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 0.3px;
    transition: transform 0.15s, opacity 0.15s;
  }
  .results-btn:hover { opacity: 0.85; }
  .results-btn.active { background: var(--accent); }
  .header-right { display: flex; gap: 6px; align-items: center; }
  .header-pill {
    background: var(--ink);
    color: #fff;
    border: none;
    border-radius: 100px;
    padding: 7px 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
  }
  .header-pill.active { background: var(--accent); }
  .header-pill.ghost { background: #F0E8DF; color: var(--ink); }
  .user-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px 6px;
    font-size: 12px;
    color: var(--ink-2);
    flex-shrink: 0;
  }
  .user-bar strong { color: var(--ink); }
  .signout-link {
    background: none;
    border: none;
    color: var(--accent);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
  }

  /* Progress bar */
  .progress-wrap {
    padding: 0 20px 8px;
    flex-shrink: 0;
  }
  .progress-track {
    height: 4px;
    background: #E8DDD5;
    border-radius: 4px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent-2));
    border-radius: 4px;
    transition: width 0.4s ease;
  }
  .progress-label {
    font-size: 11px;
    color: var(--ink-2);
    text-align: right;
    margin-top: 4px;
    font-weight: 500;
  }

  /* Card stack area */
  .card-area {
    flex: 1 1 0;
    min-height: 52vh;
    position: relative;
    overflow: hidden;
    padding: 0;
  }

  /* Card */
  .card {
    position: absolute;
    top: 8px;
    left: 20px;
    right: 20px;
    bottom: 8px;
    background: var(--surface);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
    cursor: grab;
    user-select: none;
    will-change: transform;
    transition: box-shadow 0.2s;
    touch-action: none; /* allow horizontal + vertical swipes on image/card */
  }
  .card:active { cursor: grabbing; }
  .card.pulling-results { box-shadow: var(--shadow); }
  .card.behind {
    transform: scale(0.95) translateY(12px);
    z-index: 1;
    pointer-events: none;
  }
  .card.front { z-index: 10; }

  .card-img {
    width: 100%;
    height: 62%;
    object-fit: cover;
    display: block;
    pointer-events: none;
    background: #EDE4D8;
  }
  .card-img.loading { opacity: 0.35; transition: opacity 0.3s; }
  .card-img.loaded { opacity: 1; }
  .card-img.error { opacity: 1; object-fit: contain; background: #EDE4D8; }

  .card-body {
    padding: 16px 20px 12px;
    position: relative;
  }
  .card-type-badge {
    position: absolute;
    top: -14px;
    left: 20px;
    background: var(--accent);
    color: #fff;
    font-size: 11px;
    font-weight: 700;
    padding: 4px 10px;
    border-radius: 100px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }
  .card-name {
    font-family: 'Fraunces', serif;
    font-size: 26px;
    font-weight: 700;
    line-height: 1.1;
    margin-top: 8px;
  }
  .card-breed {
    font-size: 13px;
    color: var(--ink-2);
    margin-top: 2px;
    font-weight: 500;
  }
  .card-age {
    display: inline-block;
    background: #F0E8DF;
    color: var(--ink);
    font-size: 11px;
    font-weight: 600;
    padding: 3px 9px;
    border-radius: 100px;
    margin-top: 6px;
  }
  .card-desc {
    font-size: 13px;
    color: var(--ink-2);
    margin-top: 8px;
    line-height: 1.45;
  }

  /* Swipe hint overlays */
  .swipe-hint {
    position: absolute;
    top: 20px;
    padding: 6px 16px;
    border-radius: 8px;
    font-family: 'Fraunces', serif;
    font-size: 20px;
    font-weight: 900;
    border: 3px solid;
    opacity: 0;
    transition: opacity 0.1s;
    pointer-events: none;
    z-index: 20;
    transform: rotate(-15deg);
  }
  .swipe-hint.yes {
    right: 20px;
    color: var(--yes);
    border-color: var(--yes);
    transform: rotate(15deg);
  }
  .swipe-hint.no {
    left: 20px;
    color: var(--no);
    border-color: var(--no);
    transform: rotate(-15deg);
  }
  .swipe-hint.down {
    left: 50%;
    right: auto;
    transform: translateX(-50%);
    top: auto;
    bottom: 24px;
    color: var(--accent);
    border-color: var(--accent);
  }

  /* Action buttons */
  .actions {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    padding: 14px 0 20px;
    flex-shrink: 0;
  }
  .action-btn {
    width: 62px; height: 62px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 26px;
    box-shadow: var(--shadow-sm);
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .action-btn:hover { transform: scale(1.08); box-shadow: var(--shadow); }
  .action-btn:active { transform: scale(0.95); }
  .action-btn.no-btn { background: #fff; }
  .action-btn.yes-btn { background: var(--ink); }
  .action-btn.undo-btn {
    background: #fff;
    width: 46px; height: 46px;
    font-size: 18px;
    opacity: 0.45;
    pointer-events: none;
  }
  .action-btn.undo-btn.enabled { opacity: 1; pointer-events: auto; }

  .swipe-down-hint {
    text-align: center;
    font-size: 11px;
    color: var(--ink-2);
    padding-bottom: 4px;
    flex-shrink: 0;
    opacity: 0.7;
    cursor: pointer;
    user-select: none;
  }
  .swipe-down-hint:active { opacity: 1; }

  /* End of deck */
  .end-screen {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 32px;
    text-align: center;
    z-index: 20;
  }
  .end-emoji { font-size: 64px; margin-bottom: 16px; }
  .end-title {
    font-family: 'Fraunces', serif;
    font-size: 28px;
    font-weight: 900;
    margin-bottom: 8px;
  }
  .end-sub { color: var(--ink-2); font-size: 15px; line-height: 1.5; margin-bottom: 28px; }
  .end-btn {
    background: var(--ink);
    color: #fff;
    border: none;
    border-radius: 100px;
    padding: 14px 32px;
    font-size: 16px;
    font-weight: 600;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    box-shadow: var(--shadow-sm);
    transition: transform 0.15s;
  }
  .end-btn:hover { transform: scale(1.04); }

  /* ===== RESULTS VIEW ===== */
  .results-view {
    position: absolute;
    inset: 0;
    background: var(--bg);
    z-index: 30;
    display: flex;
    flex-direction: column;
    animation: slideUp 0.35s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes slideUp {
    from { transform: translateY(100%); opacity: 0; }
    to   { transform: translateY(0); opacity: 1; }
  }
  .results-header {
    padding: 16px 20px 12px;
    border-bottom: 1px solid #EDE4D8;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .results-title {
    font-family: 'Fraunces', serif;
    font-size: 22px;
    font-weight: 900;
  }
  .close-btn {
    background: #F0E8DF;
    border: none;
    width: 36px; height: 36px;
    border-radius: 50%;
    font-size: 18px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .sort-tabs {
    display: flex;
    gap: 6px;
    padding: 10px 20px;
    overflow-x: auto;
    flex-shrink: 0;
    scrollbar-width: none;
  }
  .sort-tabs::-webkit-scrollbar { display: none; }
  .sort-tab {
    white-space: nowrap;
    background: #F0E8DF;
    border: none;
    border-radius: 100px;
    padding: 6px 14px;
    font-size: 12px;
    font-weight: 600;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    transition: background 0.15s;
  }
  .sort-tab.active { background: var(--ink); color: #fff; }

  .results-list {
    flex: 1;
    overflow-y: auto;
    padding: 6px 20px 20px;
  }
  .result-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid #EDE4D8;
  }
  .result-rank {
    font-family: 'Fraunces', serif;
    font-size: 16px;
    font-weight: 700;
    color: var(--ink-2);
    width: 24px;
    text-align: center;
    flex-shrink: 0;
  }
  .result-img {
    width: 52px; height: 52px;
    border-radius: 14px;
    object-fit: cover;
    flex-shrink: 0;
    background: #EDE4D8;
  }
  .result-img.error { object-fit: contain; }
  .result-info { flex: 1; min-width: 0; }
  .result-name {
    font-family: 'Fraunces', serif;
    font-size: 15px;
    font-weight: 700;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .result-breed { font-size: 11px; color: var(--ink-2); margin-top: 1px; }
  .result-bar-wrap { margin-top: 5px; height: 6px; background: #EDE4D8; border-radius: 4px; overflow: hidden; }
  .result-bar-yes { height: 100%; background: var(--yes); border-radius: 4px; transition: width 0.5s; }
  .result-stats {
    text-align: right;
    flex-shrink: 0;
  }
  .result-pct {
    font-family: 'Fraunces', serif;
    font-size: 18px;
    font-weight: 700;
  }
  .result-votes { font-size: 10px; color: var(--ink-2); margin-top: 1px; }
  .empty-results {
    text-align: center;
    padding: 60px 0;
    color: var(--ink-2);
    font-size: 14px;
  }

  /* Loading */
  .loading-screen {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
    z-index: 50;
    background: var(--bg);
  }
  .loading-paw { font-size: 48px; animation: pulse 0.8s ease-in-out infinite alternate; }
  @keyframes pulse { to { transform: scale(1.15); } }
  .loading-text { font-family: 'Fraunces', serif; font-size: 18px; color: var(--ink-2); }

  /* Sign-in */
  .signin-screen {
    position: absolute;
    inset: 0;
    z-index: 60;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px 28px;
    text-align: center;
  }
  .signin-title {
    font-family: 'Fraunces', serif;
    font-size: 30px;
    font-weight: 900;
    margin-bottom: 8px;
  }
  .signin-sub { color: var(--ink-2); font-size: 14px; line-height: 1.5; margin-bottom: 24px; }
  .signin-input {
    width: 100%;
    max-width: 280px;
    padding: 14px 18px;
    border: 2px solid #E8DDD5;
    border-radius: 14px;
    font-size: 16px;
    font-family: inherit;
    margin-bottom: 12px;
    background: #fff;
  }
  .signin-input:focus { outline: none; border-color: var(--accent); }
  .signin-btn {
    width: 100%;
    max-width: 280px;
    background: var(--ink);
    color: #fff;
    border: none;
    border-radius: 100px;
    padding: 14px;
    font-size: 16px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
  }
  .signin-error { color: var(--no); font-size: 13px; min-height: 20px; margin-top: 8px; }
  .signin-note { margin-top: 20px; font-size: 11px; color: var(--ink-2); opacity: 0.8; }

  /* Analytics */
  .analytics-body { flex: 1; overflow-y: auto; padding: 16px 20px 24px; }
  .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
  .stat-card {
    background: var(--surface);
    border-radius: 16px;
    padding: 14px;
    box-shadow: var(--shadow-sm);
  }
  .stat-label { font-size: 11px; color: var(--ink-2); font-weight: 600; text-transform: uppercase; letter-spacing: 0.3px; }
  .stat-value {
    font-family: 'Fraunces', serif;
    font-size: 26px;
    font-weight: 900;
    margin-top: 4px;
    line-height: 1.1;
  }
  .stat-section-title {
    font-family: 'Fraunces', serif;
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 10px;
  }
  .stat-wide { grid-column: 1 / -1; }
</style>
</head>
<body>

<div id="app"></div>

<script type="module">
// ─── Config ─────────────────────────────────────────────────────────────────
const API = window.location.protocol === "file:"
  ? "http://localhost:5050"
  : window.location.origin;

// ─── Session ID (persistent) ─────────────────────────────────────────────────
function newSessionId() {
  return crypto.randomUUID ? crypto.randomUUID() : Math.random().toString(36).slice(2) + Date.now().toString(36);
}

function getSessionId() {
  let sid = sessionStorage.getItem("pawswipe_sid");
  if (!sid) {
    sid = newSessionId();
    sessionStorage.setItem("pawswipe_sid", sid);
  }
  return sid;
}

let sessionId = getSessionId();

/** New sign-in = new voter session (fresh deck). Global results/analytics unchanged on server. */
function startNewUserSession() {
  sessionId = newSessionId();
  sessionStorage.setItem("pawswipe_sid", sessionId);
  votedMap = {};
  currentIdx = 0;
  voteHistory = [];
  closeOverlays();
  cardShownAt = Date.now();
}

function getUsername() {
  return sessionStorage.getItem("pawswipe_user") || "";
}
function setUsername(name) {
  if (name) sessionStorage.setItem("pawswipe_user", name);
  else sessionStorage.removeItem("pawswipe_user");
}

// ─── State ───────────────────────────────────────────────────────────────────
let pets = [];
let votedMap = {};  // itemId -> 'yes'|'no'
let currentIdx = 0;
let showResults = false;
let showAnalytics = false;
let showSignIn = !getUsername();
let username = getUsername();
let signInError = "";
let results = [];
let analytics = null;
let sortMode = "most-loved";
let loading = true;
let voteHistory = [];  // stack for undo: { itemId, idx }
let resultsPollTimer = null;
let cardShownAt = 0;
const MATCHES_THRESHOLD = 60;  // global yes % to count as a "match"

// ─── DOM root ───────────────────────────────────────────────────────────────
const root = document.getElementById("app");

// ─── API calls ───────────────────────────────────────────────────────────────
async function fetchPets() {
  const r = await fetch(`${API}/items`);
  return r.json();
}
async function fetchSessionVotes() {
  try {
    const r = await fetch(`${API}/session-votes/${sessionId}`);
    return r.json();
  } catch { return {}; }
}
async function postVote(itemId, choice, decisionMs) {
  try {
    await fetch(`${API}/vote`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ itemId, choice, sessionId: sessionId, decisionMs }),
    });
  } catch (e) { console.warn("Vote failed", e); }
}
async function postSignIn(name) {
  const r = await fetch(`${API}/auth/signin`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ sessionId: sessionId, username: name }),
  });
  const data = await r.json().catch(() => ({}));
  if (!r.ok) throw new Error(data.error || "Sign in failed");
  return data;
}
async function fetchAuthSession() {
  try {
    const r = await fetch(`${API}/auth/session/${sessionId}`);
    return r.json();
  } catch { return { username: null }; }
}
async function fetchAnalytics() {
  const r = await fetch(`${API}/analytics?sessionId=${encodeURIComponent(sessionId)}`);
  return r.json();
}
function formatMs(ms) {
  if (ms == null) return "—";
  if (ms < 1000) return `${ms} ms`;
  return `${(ms / 1000).toFixed(1)} s`;
}
function closeOverlays() {
  showResults = false;
  showAnalytics = false;
  stopResultsPolling();
}
async function deleteVote(itemId) {
  try {
    await fetch(`${API}/vote`, {
      method: "DELETE",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ itemId, sessionId: sessionId }),
    });
  } catch (e) { console.warn("Undo failed", e); }
}
async function fetchResults() {
  const r = await fetch(`${API}/results`);
  return r.json();
}

// ─── Init ────────────────────────────────────────────────────────────────────
async function init() {
  render();
  const auth = await fetchAuthSession();
  if (auth.username) {
    setUsername(auth.username);
    username = auth.username;
    showSignIn = false;
  } else if (!getUsername()) {
    showSignIn = true;
  }
  [pets, votedMap] = await Promise.all([fetchPets(), fetchSessionVotes()]);
  while (currentIdx < pets.length && votedMap[pets[currentIdx].id]) currentIdx++;
  loading = false;
  cardShownAt = Date.now();
  render();
}

// ─── Vote logic ──────────────────────────────────────────────────────────────
function vote(choice) {
  if (currentIdx >= pets.length) return;
  const pet = pets[currentIdx];
  const idx = currentIdx;
  votedMap[pet.id] = choice;
  voteHistory.push({ itemId: pet.id, idx });
  const decisionMs = cardShownAt ? Math.min(Date.now() - cardShownAt, 300000) : null;
  postVote(pet.id, choice, decisionMs);
  animateCard(choice, () => {
    currentIdx++;
    render();
  });
}

function undoLastVote() {
  if (!voteHistory.length) return;
  const last = voteHistory.pop();
  delete votedMap[last.itemId];
  deleteVote(last.itemId);
  currentIdx = last.idx;
  render();
}

function startResultsPolling() {
  stopResultsPolling();
  resultsPollTimer = setInterval(async () => {
    if (!showResults) return;
    results = await fetchResults();
    render();
  }, 15000);
}

function stopResultsPolling() {
  if (resultsPollTimer) {
    clearInterval(resultsPollTimer);
    resultsPollTimer = null;
  }
}

// ─── Card animation ──────────────────────────────────────────────────────────
function animateCard(direction, cb) {
  const el = document.querySelector(".card.front");
  if (!el) { cb(); return; }
  const x = direction === "yes" ? 600 : -600;
  el.style.transition = "transform 0.35s cubic-bezier(0.4,0,0.2,1), opacity 0.35s";
  el.style.transform = `translateX(${x}px) rotate(${direction === "yes" ? 20 : -20}deg)`;
  el.style.opacity = "0";
  setTimeout(cb, 340);
}

// ─── Drag / swipe (pointer events — works on image, card, mouse + touch) ───────
function attachDrag(el) {
  if (el._dragAbort) el._dragAbort.abort();
  el._dragAbort = new AbortController();
  const { signal } = el._dragAbort;

  let startX, startY, mode = null; // "h" horizontal vote | "v" vertical results

  const yesHint = () => el.querySelector(".swipe-hint.yes");
  const noHint  = () => el.querySelector(".swipe-hint.no");
  const downHint = () => el.querySelector(".swipe-hint.down");

  const clearHints = () => {
    [yesHint(), noHint(), downHint()].forEach(h => { if (h) h.style.opacity = 0; });
    el.style.boxShadow = "";
    el.classList.remove("pulling-results");
  };

  const snapBack = () => {
    el.style.transition = "transform 0.3s cubic-bezier(0.34,1.56,0.64,1)";
    el.style.transform = "";
    clearHints();
  };

  el.addEventListener("pointerdown", (e) => {
    if (showResults || showAnalytics || currentIdx >= pets.length) return;
    if (e.button !== 0) return;
    startX = e.clientX;
    startY = e.clientY;
    mode = null;
    el.style.transition = "none";
    el.setPointerCapture(e.pointerId);
  }, { signal });

  el.addEventListener("pointermove", (e) => {
    if (!el.hasPointerCapture(e.pointerId)) return;
    const dx = e.clientX - startX;
    const dy = e.clientY - startY;

    if (!mode && (Math.abs(dx) > 12 || Math.abs(dy) > 12)) {
      mode = Math.abs(dx) >= Math.abs(dy) ? "h" : "v";
    }

    if (mode === "h") {
      const rot = dx * 0.08;
      el.style.transform = `translateX(${dx}px) rotate(${rot}deg)`;
      const ratio = Math.min(Math.abs(dx) / 100, 1);
      const yh = yesHint(), nh = noHint(), dh = downHint();
      if (dh) dh.style.opacity = 0;
      if (dx > 20 && yh) { yh.style.opacity = ratio; if (nh) nh.style.opacity = 0; el.style.boxShadow = `0 12px 48px rgba(56,193,114,${ratio * 0.4})`; }
      else if (dx < -20 && nh) { nh.style.opacity = ratio; if (yh) yh.style.opacity = 0; el.style.boxShadow = `0 12px 48px rgba(227,52,47,${ratio * 0.4})`; }
      else { clearHints(); }
    } else if (mode === "v" && dy > 0) {
      const pull = Math.min(dy, 120);
      el.style.transform = `translateY(${pull}px)`;
      const ratio = Math.min(pull / 80, 1);
      const dh = downHint(), yh = yesHint(), nh = noHint();
      if (yh) yh.style.opacity = 0;
      if (nh) nh.style.opacity = 0;
      if (dh) dh.style.opacity = ratio;
      el.classList.add("pulling-results");
    }
  }, { signal });

  el.addEventListener("pointerup", (e) => {
    if (!el.hasPointerCapture(e.pointerId)) return;
    el.releasePointerCapture(e.pointerId);
    const dx = e.clientX - startX;
    const dy = e.clientY - startY;
    el.style.transition = "";

    if (mode === "v" && dy > 55) {
      snapBack();
      app.openResults();
    } else if (mode === "h" && dx > 80) vote("yes");
    else if (mode === "h" && dx < -80) vote("no");
    else snapBack();
    mode = null;
  }, { signal });

  el.addEventListener("pointercancel", () => { snapBack(); mode = null; }, { signal });
}

// Swipe down on card-area / hint (backup)
function attachResultsSwipe(el) {
  if (el._swipeAbort) el._swipeAbort.abort();
  el._swipeAbort = new AbortController();
  const { signal } = el._swipeAbort;
  let startX, startY, tracking = false;

  el.addEventListener("pointerdown", (e) => {
    if (showResults || showAnalytics || currentIdx >= pets.length) return;
    startX = e.clientX;
    startY = e.clientY;
    tracking = true;
  }, { signal });

  el.addEventListener("pointerup", (e) => {
    if (!tracking) return;
    tracking = false;
    const dx = e.clientX - startX;
    const dy = e.clientY - startY;
    if (Math.abs(dx) < 50 && dy > 45) app.openResults();
  }, { signal });
}

// ─── Image helpers ───────────────────────────────────────────────────────────
function imageFallback(pet) {
  if (pet.type === "Dog") return `https://placedog.net/600/800?id=${pet.id}`;
  const id = parseInt(pet.id, 10);
  if (id >= 80 && id <= 100) return `https://placecats.com/600/800?id=${pet.id}`;
  const tag = { Cat: "cat", Rabbit: "rabbit", Bird: "bird", Hamster: "hamster", "Guinea Pig": "guineapig" }[pet.type] || "pet";
  return `https://loremflickr.com/600/800/${tag}?lock=${pet.id}`;
}

function bindPetImage(img, pet) {
  const fallback = imageFallback(pet);
  img.onload = () => img.classList.replace("loading", "loaded");
  img.onerror = () => {
    if (img.dataset.fallback === "1") {
      img.classList.add("error");
      return;
    }
    img.dataset.fallback = "1";
    img.src = fallback;
  };
  if (img.complete && img.naturalWidth > 0) img.classList.replace("loading", "loaded");
}

// ─── Render helpers ──────────────────────────────────────────────────────────
function cardHTML(pet, cls) {
  return `
  <div class="card ${cls}" data-id="${pet.id}">
    <img class="card-img loading" src="${pet.image}" alt="${pet.name}" draggable="false" referrerpolicy="no-referrer"/>
    <div class="swipe-hint yes">ADOPT ♥</div>
    <div class="swipe-hint no">SKIP ✕</div>
    <div class="swipe-hint down">RESULTS ↓</div>
    <div class="card-body">
      <span class="card-type-badge">${pet.type}</span>
      <div class="card-name">${pet.name}</div>
      <div class="card-breed">${pet.breed}</div>
      <span class="card-age">🐾 ${pet.age}</span>
      <div class="card-desc">${pet.description}</div>
    </div>
  </div>`;
}

function sortedResults() {
  const r = [...results];
  if (sortMode === "most-loved")  return r.filter(x=>x.total>0).sort((a,b)=>b.yes_pct-a.yes_pct).concat(r.filter(x=>x.total===0));
  if (sortMode === "most-skipped") return r.sort((a,b)=>a.total-b.total);
  if (sortMode === "most-divisive") return r.filter(x=>x.total>0).sort((a,b)=>a.divisiveness-b.divisiveness).concat(r.filter(x=>x.total===0));
  if (sortMode === "most-popular") return r.sort((a,b)=>b.total-a.total);
  if (sortMode === "matches") {
    return r.filter(p => votedMap[p.id] === "yes" && p.yes_pct >= MATCHES_THRESHOLD && p.total > 0)
      .sort((a, b) => b.yes_pct - a.yes_pct);
  }
  return r;
}

// ─── Main render ─────────────────────────────────────────────────────────────
function render() {
  const votedCount = Object.keys(votedMap).length;
  const pct = pets.length ? Math.round((votedCount / pets.length) * 100) : 0;
  const remaining = pets.length - currentIdx;

  if (loading) {
    root.innerHTML = `
      <div class="loading-screen">
        <div class="loading-paw">🐾</div>
        <div class="loading-text">Loading adorable pets…</div>
      </div>`;
    return;
  }

  if (showSignIn) {
    root.innerHTML = `
      <div class="signin-screen">
        <div class="signin-title">Paw<span style="color:var(--accent)">Swipe</span></div>
        <p class="signin-sub">Choose a username to sign in and save your votes across reloads.</p>
        <input class="signin-input" id="signin-input" placeholder="Your username" maxlength="24" autocomplete="username"/>
        <button class="signin-btn" onclick="app.submitSignIn()">Start swiping →</button>
        <p class="signin-error">${signInError}</p>
        <p class="signin-note">Lightweight demo sign-in — no password required.</p>
      </div>`;
    const inp = document.getElementById("signin-input");
    if (inp) {
      inp.addEventListener("keydown", e => { if (e.key === "Enter") app.submitSignIn(); });
      inp.focus();
    }
    return;
  }

  // Results overlay
  let resultsHTML = "";
  if (showResults) {
    const sorted = sortedResults();
    const rowsHTML = sorted.length === 0
      ? `<div class="empty-results">${sortMode === "matches" ? `💕 No matches yet — vote yes on pets others love (${MATCHES_THRESHOLD}%+ yes)` : "🐾 No votes yet — start swiping!"}</div>`
      : sorted.map((p, i) => `
        <div class="result-item">
          <div class="result-rank">${i + 1}</div>
          <img class="result-img" src="${p.image}" alt="${p.name}" loading="lazy" referrerpolicy="no-referrer" data-pet-id="${p.id}" data-pet-type="${p.type}"/>
          <div class="result-info">
            <div class="result-name">${p.name}</div>
            <div class="result-breed">${p.breed}</div>
            <div class="result-bar-wrap"><div class="result-bar-yes" style="width:${p.yes_pct}%"></div></div>
          </div>
          <div class="result-stats">
            <div class="result-pct" style="color:${p.yes_pct>=50?'var(--yes)':'var(--no)'}">${p.yes_pct}%</div>
            <div class="result-votes">${p.yes}✓ ${p.no}✗</div>
          </div>
        </div>`).join("");

    const tabs = [
      {key:"most-loved",label:"💛 Most Loved"},
      {key:"most-popular",label:"🔥 Most Voted"},
      {key:"most-divisive",label:"⚡ Divisive"},
      {key:"most-skipped",label:"👻 Least Voted"},
      {key:"matches",label:"💕 Matches"},
    ];
    resultsHTML = `
      <div class="results-view">
        <div class="results-header">
          <div class="results-title">Results 🐾</div>
          <button class="close-btn" onclick="app.closeResults()">✕</button>
        </div>
        <div class="sort-tabs">
          ${tabs.map(t=>`<button class="sort-tab${sortMode===t.key?" active":""}" onclick="app.setSort('${t.key}')">${t.label}</button>`).join("")}
        </div>
        <div class="results-list">${rowsHTML}</div>
      </div>`;
  }

  let analyticsHTML = "";
  if (showAnalytics && analytics) {
    const a = analytics;
    const you = a.you || {};
    analyticsHTML = `
      <div class="results-view">
        <div class="results-header">
          <div class="results-title">Analytics 📊</div>
          <button class="close-btn" onclick="app.closeAnalytics()">✕</button>
        </div>
        <div class="analytics-body">
          <div class="stat-section-title">Everyone</div>
          <div class="stat-grid">
            <div class="stat-card"><div class="stat-label">Total swipes</div><div class="stat-value">${a.totalSwipes}</div></div>
            <div class="stat-card"><div class="stat-label">Voters</div><div class="stat-value">${a.totalSessions}</div></div>
            <div class="stat-card"><div class="stat-label">Signed in</div><div class="stat-value">${a.signedInUsers}</div></div>
            <div class="stat-card"><div class="stat-label">Avg decision</div><div class="stat-value">${formatMs(a.avgDecisionMs)}</div></div>
            <div class="stat-card stat-wide"><div class="stat-label">Yes / No split</div><div class="stat-value">${a.yesCount} ✓ · ${a.noCount} ✗</div></div>
          </div>
          ${you.username ? `
          <div class="stat-section-title">You (@${you.username})</div>
          <div class="stat-grid">
            <div class="stat-card"><div class="stat-label">Your votes</div><div class="stat-value">${you.votes}</div></div>
            <div class="stat-card"><div class="stat-label">Your avg time</div><div class="stat-value">${formatMs(you.avgDecisionMs)}</div></div>
            <div class="stat-card stat-wide"><div class="stat-label">Your yes / no</div><div class="stat-value">${you.yesCount} ✓ · ${you.noCount} ✗</div></div>
          </div>` : ""}
        </div>
      </div>`;
  }

  // Main cards
  let cardsHTML = "";
  if (currentIdx < pets.length) {
    const front = pets[currentIdx];
    const behind = pets[currentIdx + 1];
    cardsHTML = (behind ? cardHTML(behind, "behind") : "") + cardHTML(front, "front");
  } else {
    cardsHTML = `
      <div class="end-screen">
        <div class="end-emoji">🎉</div>
        <div class="end-title">You've seen them all!</div>
        <div class="end-sub">You voted on ${votedCount} pets. See how everyone else voted too.</div>
        <button class="end-btn" onclick="app.openResults()">See Results →</button>
      </div>`;
  }

  root.innerHTML = `
    <div class="header">
      <div class="logo">Paw<span>Swipe</span></div>
      <div class="header-right">
        <button class="header-pill ghost${showAnalytics?" active":""}" onclick="app.toggleAnalytics()">${showAnalytics ? "← Back" : "Stats"}</button>
        <button class="header-pill${showResults?" active":""}" onclick="app.toggleResults()">${showResults ? "← Back" : "Results"}</button>
      </div>
    </div>
    <div class="user-bar">
      <span>Signed in as <strong>@${username}</strong></span>
      <button class="signout-link" onclick="app.signOut()">Sign out</button>
    </div>
    <div class="progress-wrap">
      <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
      <div class="progress-label">${votedCount} / ${pets.length} pets voted</div>
    </div>
    ${!showResults && !showAnalytics && currentIdx < pets.length ? '<div class="swipe-down-hint" onclick="app.openResults()">↓ Swipe down for results</div>' : ''}
    <div class="card-area">${cardsHTML}</div>
    <div class="actions">
      <button class="action-btn undo-btn${voteHistory.length ? ' enabled' : ''}" onclick="app.undo()" title="Undo">↩</button>
      <button class="action-btn no-btn" onclick="app.vote('no')" title="No">❌</button>
      <button class="action-btn yes-btn" onclick="app.vote('yes')" title="Adopt">🐾</button>
    </div>
    ${resultsHTML}
    ${analyticsHTML}
  `;

  // Swipe on card (incl. image): left/right = vote, down = results
  const cardArea = root.querySelector(".card-area");
  if (cardArea) attachResultsSwipe(cardArea);
  const swipeHint = root.querySelector(".swipe-down-hint");
  if (swipeHint) attachResultsSwipe(swipeHint);

  const frontCard = root.querySelector(".card.front");
  if (frontCard) {
    cardShownAt = Date.now();
    attachDrag(frontCard);
    const pet = pets[currentIdx];
    const img = frontCard.querySelector(".card-img");
    if (img && pet) bindPetImage(img, pet);
  }

  root.querySelectorAll(".result-img[data-pet-id]").forEach(img => {
    const pet = results.find(p => p.id === img.dataset.petId) || {
      id: img.dataset.petId,
      type: img.dataset.petType,
      name: img.alt,
    };
    bindPetImage(img, pet);
  });
}

// ─── App interface (called from inline handlers) ──────────────────────────────
window.app = {
  vote(c) { vote(c); },
  undo() { undoLastVote(); },
  async submitSignIn() {
    const inp = document.getElementById("signin-input");
    const name = (inp?.value || "").trim();
    signInError = "";
    if (!name) { signInError = "Enter a username"; render(); return; }
    try {
      startNewUserSession();
      const data = await postSignIn(name);
      username = data.username;
      setUsername(username);
      showSignIn = false;
      render();
    } catch (e) {
      signInError = e.message || "Sign in failed";
      render();
    }
  },
  signOut() {
    setUsername("");
    username = "";
    startNewUserSession();
    showSignIn = true;
    render();
  },
  toggleResults() {
    if (showResults) {
      closeOverlays();
      render();
      return;
    }
    closeOverlays();
    showResults = true;
    fetchResults().then(r => { results = r; render(); startResultsPolling(); });
  },
  openResults() {
    closeOverlays();
    showResults = true;
    fetchResults().then(r => { results = r; render(); startResultsPolling(); });
  },
  closeResults() {
    closeOverlays();
    render();
  },
  toggleAnalytics() {
    if (showAnalytics) {
      closeOverlays();
      render();
      return;
    }
    closeOverlays();
    showAnalytics = true;
    fetchAnalytics().then(a => { analytics = a; render(); });
  },
  openAnalytics() {
    closeOverlays();
    showAnalytics = true;
    fetchAnalytics().then(a => { analytics = a; render(); });
  },
  closeAnalytics() {
    closeOverlays();
    render();
  },
  setSort(s) { sortMode = s; render(); },
};

init();
</script>
